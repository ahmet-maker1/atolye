# Fly.io config — https://fly.io/docs/reference/configuration/
# `app` ve `region` deploy sırasında elle ayarlanacak
app = "atolye-co"
primary_region = "fra"

[build]
  # Dockerfile otomatik algılanır

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DATA_DIR = "/data"

# Persistent volume — DB ve uploads burada saklanır
[mounts]
  source = "atolye_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # always-on (uyumaz)
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

# Free credit içinde kalmak için minimum makine
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
